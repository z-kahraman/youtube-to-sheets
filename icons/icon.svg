<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Google Sheets yeşili yuvarlak kare (spreadsheet gövdesi) -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="#1E9E57"/>

  <!-- Hücre ızgara çizgileri (koyu yeşil) -->
  <g stroke="#168A49" stroke-width="3" stroke-linecap="round">
    <line x1="64" y1="24" x2="64" y2="104"/>
    <line x1="24" y1="64" x2="104" y2="64"/>
  </g>

  <!-- Sol-üst hücre: beyaz kart + yeşil play -->
  <rect x="22" y="22" width="36" height="36" rx="8" fill="#ffffff"/>
  <path d="M37 33 L37 47 L49 40 Z" fill="#1E9E57"/>

  <!-- Sağ-üst hücre: kısa satır çizgileri -->
  <g fill="#ffffff">
    <rect x="71" y="30" width="33" height="5" rx="2.5"/>
    <rect x="71" y="40" width="25" height="5" rx="2.5"/>
    <rect x="71" y="50" width="29" height="5" rx="2.5"/>
  </g>

  <!-- Alt: tam genişlik satır çizgileri -->
  <g fill="#ffffff">
    <rect x="24" y="73" width="80" height="5" rx="2.5"/>
    <rect x="24" y="85" width="80" height="5" rx="2.5"/>
    <rect x="24" y="97" width="62" height="5" rx="2.5"/>
  </g>
</svg>
