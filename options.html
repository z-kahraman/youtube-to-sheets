<!DOCTYPE html>
<html lang="tr" data-theme="auto">
<head>
  <meta charset="utf-8">
  <title>YouTube to Sheets</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <header class="app-header">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div>
      <h1>YouTube to Sheets</h1>
      <p class="subtitle" data-i18n="subtitle"></p>
    </div>
  </header>

  <div class="settings-row">
    <div class="setting">
      <label class="field-label" for="lang-select">Dil / Language</label>
      <select id="lang-select">
        <option value="tr">Türkçe</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="setting">
      <label class="field-label" for="theme-select" data-i18n="themeLabel"></label>
      <select id="theme-select">
        <option value="auto" data-i18n="themeAuto"></option>
        <option value="light" data-i18n="themeLight"></option>
        <option value="dark" data-i18n="themeDark"></option>
      </select>
    </div>
  </div>

  <main>
  <div id="not-connected" class="card hidden">
    <p class="muted" data-i18n="notConnected"></p>
    <button id="connect-btn" data-i18n="connect"></button>
  </div>

  <div id="connected" class="card hidden">
    <div class="account-row">
      <div class="avatar" id="user-avatar" aria-hidden="true"></div>
      <div class="account-info">
        <div class="status">
          <span class="dot"></span>
          <span class="status-label" data-i18n="accountConnected"></span>
        </div>
        <p class="email" id="user-email">...</p>
      </div>
    </div>
    <button id="disconnect-btn" class="secondary" data-i18n="disconnect"></button>
  </div>

  <div id="sheet-section" class="card hidden">
    <h2>
      <span class="card-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8"/></svg>
      </span>
      <span data-i18n="targetSheet"></span>
    </h2>

    <div id="current-sheet" class="hidden">
      <p class="muted" data-i18n="currentlySelected"></p>
      <p class="sheet-name" id="selected-sheet-name"></p>
      <div class="btn-row">
        <a id="open-sheet-btn" class="btn-link" target="_blank" rel="noopener" data-i18n="openSheet"></a>
        <button id="change-sheet-btn" class="secondary" data-i18n="change"></button>
      </div>
      <p class="hint" data-i18n="howToHint"></p>
    </div>

    <div id="sheet-picker" class="hidden">
      <p class="muted" data-i18n="noSheetsHelp"></p>
      <label class="field-label" data-i18n="pickCreated"></label>
      <select id="sheet-list"></select>
      <button id="use-selected-btn" data-i18n="useThis"></button>
      <hr>
      <label class="field-label" data-i18n="orCreateNew"></label>
      <input type="text" id="new-sheet-name">
      <button id="create-sheet-btn" data-i18n="createNew"></button>
    </div>
  </div>

  </main>

  <footer class="app-footer">
    <span id="app-version"></span>
    <span aria-hidden="true">·</span>
    <a id="privacy-link" target="_blank" rel="noopener" data-i18n="footerPrivacy"></a>
  </footer>

  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <script src="strings.js"></script>
  <script src="auth.js"></script>
  <script src="options.js"></script>
</body>
</html>
